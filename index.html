<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>প্রশ্নপত্র বিল্ডার | Question Paper Builder</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<!-- React 18 (jsDelivr — more stable than unpkg) -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

<!-- Babel Standalone — pinned version, with data-presets on script tags -->
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>

<!-- jsPDF + html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<!-- Tesseract.js — in-browser OCR, no API needed -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-family:'Inter','Hind Siliguri',sans-serif;-webkit-font-smoothing:antialiased;background:#f5f3ee}
body{min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.bn{font-family:'Hind Siliguri','Noto Serif Bengali',sans-serif;line-height:1.85}
.bn-serif{font-family:'Noto Serif Bengali',serif;line-height:1.9}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#4f63f8;color:#fff}.btn-primary:hover:not(:disabled){background:#3543ed}
.btn-secondary{background:#fff;color:#1a1d2e;border:1px solid #e8e5de}.btn-secondary:hover{background:#f5f3ee}
.btn-ghost{background:transparent;color:#6b7299;padding:6px 10px}.btn-ghost:hover{background:#f5f3ee}
.btn-danger{background:transparent;color:#dc2626;padding:6px 10px}.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}

/* Card */
.card{background:#fff;border-radius:12px;border:1px solid #e8e5de;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05)}

/* Inputs */
.inp{width:100%;padding:8px 12px;border:1px solid #e8e5de;border-radius:8px;font-size:13px;color:#1a1d2e;background:#fff;outline:none;transition:border .15s,box-shadow .15s;font-family:'Hind Siliguri','Inter',sans-serif}
.inp:focus{border-color:#9bb1fd;box-shadow:0 0 0 3px rgba(79,99,248,.12)}
.ta{width:100%;padding:8px 12px;border:1px solid #e8e5de;border-radius:8px;font-size:13px;color:#1a1d2e;background:#fff;outline:none;resize:none;transition:border .15s,box-shadow .15s;font-family:'Hind Siliguri','Inter',sans-serif;line-height:1.8}
.ta:focus{border-color:#9bb1fd;box-shadow:0 0 0 3px rgba(79,99,248,.12)}
.lbl{display:block;font-size:11px;font-weight:600;color:#6b7299;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-mcq{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-cq{background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe;font-family:'Hind Siliguri',sans-serif}
.badge-sq{background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4}

/* Layout */
.toolbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid #e8e5de;height:56px;display:flex;align-items:center;padding:0 20px;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:#4f63f8;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;font-family:'Noto Serif Bengali',serif;flex-shrink:0}
.logo-p{font-size:13px;font-weight:700;color:#1a1d2e;line-height:1;font-family:'Hind Siliguri',sans-serif}
.logo-s{font-size:11px;color:#6b7299;line-height:1;margin-top:2px}
.main{display:flex;gap:24px;max-width:1280px;margin:0 auto;padding:24px 20px 80px}
.editor-col{width:480px;flex-shrink:0;display:flex;flex-direction:column;gap:18px}
.preview-col{flex:1;min-width:0}
.preview-sticky{position:sticky;top:68px}
.sec-hdr{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:#3d4166;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.sec-hdr::before{content:'';display:inline-block;width:4px;height:16px;background:#4f63f8;border-radius:2px;flex-shrink:0}

/* Question card */
.qcard{background:#fff;border-radius:12px;border:1px solid #e8e5de;border-left-width:4px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:box-shadow .15s;margin-bottom:12px;cursor:pointer}
.qcard.active{outline:2px solid #9bb1fd;box-shadow:0 2px 12px rgba(79,99,248,.15)}
.qcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.09)}
.qcard.mc{border-left-color:#3b82f6}
.qcard.cq{border-left-color:#8b5cf6}
.qcard.sq{border-left-color:#14b8a6}
.qcard-head{display:flex;align-items:center;gap:8px;padding:11px 14px}
.qcard-body{border-top:1px solid #f0ede8;padding:14px}
.qnum{width:22px;height:22px;border-radius:50%;background:#1a1d2e;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qprev{font-size:12px;color:#6b7299;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;font-family:'Hind Siliguri',sans-serif}

/* Drop zone */
.dropzone{border:2px dashed #e8e5de;border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.dropzone:hover,.dropzone.dov{border-color:#9bb1fd;background:#f0f4ff}

/* Notification */
.notif{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #e8e5de;box-shadow:0 8px 32px rgba(0,0,0,.12);border-radius:12px;padding:11px 16px;display:flex;align-items:center;gap:10px;min-width:260px;max-width:380px;z-index:9999;animation:sup .25s ease-out}
@keyframes sup{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* Modal */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.2);width:100%;max-width:500px;overflow:hidden}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid #e8e5de}
.mbody{padding:22px;display:flex;flex-direction:column;gap:18px}
.mfoot{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px;border-top:1px solid #e8e5de}

/* Math hint bar */
.math-hint{position:fixed;bottom:0;left:0;right:0;background:#1a1d2e;color:rgba(255,255,255,.72);font-size:11px;padding:5px 12px;text-align:center;pointer-events:none;z-index:30}
.math-hint code{background:rgba(255,255,255,.15);padding:1px 5px;border-radius:4px;font-size:10px}

/* Option row */
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.opt-lbl{width:28px;height:28px;border-radius:50%;background:#eff6ff;border:1px solid #bfdbfe;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1d4ed8;flex-shrink:0;font-family:'Hind Siliguri',sans-serif}
.cq-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.cq-chip{width:24px;height:24px;border-radius:50%;background:#f5f3ff;border:1px solid #ddd6fe;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6d28d9;flex-shrink:0;margin-top:20px}

/* Add buttons */
.add-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}

/* Preview frame */
.prev-frame{background:#fff;border-radius:12px;border:1px solid #e8e5de;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow-y:auto;max-height:calc(100vh - 128px)}

/* Toggle switch */
.tog{position:relative;width:40px;height:20px;border-radius:10px;background:#e5e7eb;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;padding:0}
.tog.on{background:#4f63f8}
.tog-dot{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s;pointer-events:none}
.tog.on .tog-dot{transform:translateX(20px)}

/* Tab bar (mobile) */
.tabbar{display:none;gap:4px;background:#f5f3ee;border:1px solid #e8e5de;border-radius:10px;padding:4px}
.tabbtn{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#6b7299;transition:all .15s}
.tabbtn.on{background:#fff;color:#1a1d2e;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* ── Preview / PDF print styles ── */
.pp{font-family:'Noto Serif Bengali','Hind Siliguri',serif;font-size:12pt;line-height:1.9;color:#111;background:#fff;padding:28px 32px}
.pp-hdr{text-align:center;border-bottom:2.5px solid #111;padding-bottom:12px;margin-bottom:18px}
.pp-hdr h1{font-size:17pt;font-weight:700;font-family:'Noto Serif Bengali',serif}
.pp-hdr h2{font-size:13pt;font-weight:600;margin-top:4px;font-family:'Noto Serif Bengali',serif}
.pp-meta{display:flex;justify-content:space-between;font-size:10pt;margin-top:8px}
.pp-meta div{flex:1}
.pp-meta div:nth-child(2){text-align:center}
.pp-meta div:nth-child(3){text-align:right}
.sec-title{font-size:13pt;font-weight:700;border-bottom:1px solid #333;padding-bottom:3px;margin:18px 0 10px;font-family:'Noto Serif Bengali',serif}
.qblock{margin-bottom:14px;page-break-inside:avoid}
.qstem{font-weight:600;margin-bottom:5px}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:3px 20px;margin-left:22px;font-size:11pt}
.mcq-opt{display:flex;gap:5px;align-items:flex-start}
.cq-stim{margin-left:20px;font-style:italic;border-left:3px solid #999;padding-left:10px;margin-bottom:8px;font-size:11pt}
.cq-subs{margin-left:20px;font-size:11pt}
.cq-si{display:flex;gap:8px;margin-bottom:3px}
.pp-foot{border-top:1px solid #555;margin-top:32px;padding-top:6px;font-size:9pt;color:#555;text-align:center}
.correct-opt{font-weight:700;color:#15803d}
.prev-empty{text-align:center;padding:60px 20px;color:#9ca3af}

@media(max-width:760px){
  .editor-col{width:100%}
  .preview-col{display:none}
  .preview-col.mob-show{display:block;flex:none;width:100%}
  .editor-col.mob-hide{display:none}
  .tabbar{display:flex}
  .logo-p,.logo-s{display:none}
  .main{gap:0;padding:12px 12px 80px}
}

@media print{
  .toolbar,.math-hint,.moverlay,.notif{display:none!important}
  .main{display:block;padding:0}
  .editor-col{display:none!important}
  .preview-col{display:block!important}
  .prev-frame{box-shadow:none;border:none;max-height:none;overflow:visible}
  .pp{padding:10mm 15mm}
}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#6b7299;font-family:Inter,sans-serif"><div style="font-size:32px">⏳</div><p style="font-size:14px">Loading Question Paper Builder...</p></div></div>

<script type="text/babel" data-presets="react">
/* ── destructure React hooks ── */
const {useState,useReducer,useContext,createContext,useRef,useEffect,useCallback} = React;

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
let _n = 0;
const uid = () => 'q_' + Date.now() + '_' + (++_n);

function renderMath(text) {
  if (!text) return '';
  let out = '';
  const bp = text.split(/(\$\$[\s\S]+?\$\$)/g);
  for (const seg of bp) {
    if (seg.startsWith('$$') && seg.endsWith('$$')) {
      try { out += katex.renderToString(seg.slice(2,-2),{displayMode:true,throwOnError:false}); }
      catch(e) { out += '<span style="color:red">[math err]</span>'; }
    } else {
      const ip = seg.split(/(\$[^$\n]+?\$)/g);
      for (const p of ip) {
        if (p.startsWith('$') && p.endsWith('$') && p.length > 2) {
          try { out += katex.renderToString(p.slice(1,-1),{displayMode:false,throwOnError:false}); }
          catch(e) { out += '<span style="color:red">[math err]</span>'; }
        } else {
          out += p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
      }
    }
  }
  return out;
}

const MText = ({t, cls=''}) => (
  <span className={cls} dangerouslySetInnerHTML={{__html: renderMath(t || '')}} />
);

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const makeQ = (type) => {
  const base = {id:uid(),type};
  if (type==='mcq') return {...base, stem:'', options:{a:'',b:'',c:'',d:''}, correctAnswer:'', marks:1};
  if (type==='cq')  return {...base, stimulus:'', subA:'', subB:'', subC:'', subD:''};
  return {...base, stem:'', marks:5};
};

const defHdr = {schoolName:'',examTitle:'',subject:'',time:'',totalMarks:'',year:String(new Date().getFullYear()),instructions:''};

const initState = {
  header: defHdr,
  questions: [],
  settings: {
    geminiApiKey: (typeof localStorage !== 'undefined' && localStorage.getItem('qpb_key')) || '',
    mcqStyle: (typeof localStorage !== 'undefined' && localStorage.getItem('qpb_mcq')) || 'bangla',
    showAns: false,
  },
  ui: {settingsOpen:false, activeId:null, notif:null, tab:'editor'},
};

function reducer(s, a) {
  switch(a.t) {
    case 'HDR':      return {...s, header:{...s.header,...a.p}};
    case 'ADD_Q': {
      const q = makeQ(a.p);
      return {...s, questions:[...s.questions,q], ui:{...s.ui,activeId:q.id}};
    }
    case 'UPD_Q':    return {...s, questions:s.questions.map(q=>q.id===a.id?{...q,...a.p}:q)};
    case 'DEL_Q':    return {...s, questions:s.questions.filter(q=>q.id!==a.id), ui:{...s.ui,activeId:s.ui.activeId===a.id?null:s.ui.activeId}};
    case 'REORDER':  return {...s, questions:a.p};
    case 'IMPORT': {
      const qs = a.p.map(q=>({...makeQ(q.type||'sq'),...q,id:uid()}));
      return {...s, questions:[...s.questions,...qs]};
    }
    case 'CLEAR':    return {...s, questions:[], header:defHdr};
    case 'SETTINGS': return {...s, settings:{...s.settings,...a.p}};
    case 'SAVE_KEY':
      try { localStorage.setItem('qpb_key',a.p); localStorage.setItem('qpb_mcq',s.settings.mcqStyle); } catch(e){}
      return {...s, settings:{...s.settings,geminiApiKey:a.p}};
    case 'NOTIF':    return {...s, ui:{...s.ui,notif:a.p}};
    case 'CLRN':     return {...s, ui:{...s.ui,notif:null}};
    case 'ACTIVE':   return {...s, ui:{...s.ui,activeId:a.p}};
    case 'SETOPEN':  return {...s, ui:{...s.ui,settingsOpen:a.p}};
    case 'TAB':      return {...s, ui:{...s.ui,tab:a.p}};
    default: return s;
  }
}

const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ══════════════════════════════════════════════
   GEMINI API
══════════════════════════════════════════════ */
/* ── Gemini text-only endpoint (much cheaper than vision) ── */
const GURL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

/* ── Step 1: Tesseract OCR — runs fully in browser, free, no API ── */
async function runOCR(file, onProgress) {
  const worker = await Tesseract.createWorker(['ben','eng'], 1, {
    logger: m => {
      if (m.status === 'recognizing text' && onProgress) {
        onProgress(Math.round(m.progress * 100));
      }
    }
  });
  const { data: { text } } = await worker.recognize(file);
  await worker.terminate();
  return text.trim();
}

/* ── Step 2: Gemini text→JSON (text tokens only, ~10x cheaper) ── */
async function geminiStructure(rawText, key) {
  if (!key) throw new Error('No API key. Open ⚙ Settings first.');
  const prompt = `You are an expert at parsing Bangladeshi SSC/HSC exam question papers.
Below is raw OCR text extracted from a question paper image. It may have minor OCR errors.
Your job: clean the text, identify all questions, and return a JSON array ONLY — no markdown fences, no explanation.

Schema:
MCQ: {"type":"mcq","stem":"...","options":{"a":"...","b":"...","c":"...","d":"..."},"marks":1}
CQ:  {"type":"cq","stimulus":"...","subA":"...","subB":"...","subC":"...","subD":"..."}
SQ:  {"type":"sq","stem":"...","marks":5}

Rules:
- Fix obvious OCR typos but preserve Bangla script
- MCQ options are usually labeled ক/খ/গ/ঘ or a/b/c/d
- CQ (সৃজনশীল) has a stimulus (উদ্দীপক) and 4 sub-questions
- Wrap math expressions in $...$ inline or $$...$$ block
- Return ONLY a valid JSON array, nothing else

RAW OCR TEXT:
${rawText}`;

  const body = {
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.1, maxOutputTokens:4096}
  };
  const res = await fetch(GURL+'?key='+key, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e?.error?.message || 'Gemini API error ' + res.status);
  }
  const data = await res.json();
  const text = (data?.candidates?.[0]?.content?.parts?.[0]?.text || '')
    .replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  try {
    const arr = JSON.parse(text);
    if (!Array.isArray(arr)) throw new Error('Not an array');
    return arr;
  } catch(e) {
    throw new Error('Gemini could not parse structure. Try editing the OCR text manually.');
  }
}

async function geminiTest(key) {
  const body = {contents:[{parts:[{text:'Reply with: OK'}]}],generationConfig:{maxOutputTokens:5}};
  const res = await fetch(GURL+'?key='+key, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||'Status '+res.status); }
  return true;
}

/* ══════════════════════════════════════════════
   PDF EXPORT
══════════════════════════════════════════════ */
async function doExport(header) {
  const el = document.getElementById('pdf-root');
  if (!el) throw new Error('Preview element not found');
  const prev = el.style.cssText;
  el.style.cssText = 'position:fixed;top:-99999px;left:0;width:794px;background:#fff;visibility:visible;display:block;z-index:-1;';
  try {
    const canvas = await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff',width:794,logging:false});
    const imgData = canvas.toDataURL('image/png');
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=pdf.internal.pageSize.getWidth(), H=pdf.internal.pageSize.getHeight();
    const m=12, cw=W-m*2;
    const scale=cw/(canvas.width/2);
    const totalH=(canvas.height/2)*scale;
    const usable=H-m*2;
    if (totalH<=usable) {
      pdf.addImage(imgData,'PNG',m,m,cw,totalH);
    } else {
      const pages=Math.ceil(totalH/usable);
      for (let i=0;i<pages;i++) {
        if (i>0) pdf.addPage();
        pdf.addImage(imgData,'PNG',m,m-(i*usable),cw,totalH);
        pdf.setFillColor(255,255,255);
        pdf.rect(0,0,W,m,'F');
        pdf.rect(0,m+usable,W,H,'F');
      }
    }
    const name=((header.examTitle||'paper')+'_'+(header.subject||'exam')).replace(/\s+/g,'_')+'.pdf';
    pdf.save(name);
  } finally {
    el.style.cssText = prev;
  }
}

/* ══════════════════════════════════════════════
   COMPONENTS
══════════════════════════════════════════════ */

/* Toast */
function Toast() {
  const {s,d} = useApp();
  const n = s.ui.notif;
  useEffect(()=>{
    if (!n) return;
    const t = setTimeout(()=>d({t:'CLRN'}),4000);
    return ()=>clearTimeout(t);
  },[n]);
  if (!n) return null;
  const ic = {success:'✅',error:'❌',warning:'⚠️'}[n.type]||'ℹ️';
  return (
    <div className="notif">
      <span style={{fontSize:16}}>{ic}</span>
      <span style={{fontSize:13,flex:1,color:'#1a1d2e'}}>{n.msg}</span>
      <button className="btn btn-ghost btn-sm" onClick={()=>d({t:'CLRN'})}>✕</button>
    </div>
  );
}

/* Image upload — 3-stage pipeline: OCR → Review → Gemini structure */
function ImgUpload() {
  const {s,d} = useApp();
  const [file,setFile]     = useState(null);
  const [prev,setPrev]     = useState(null);
  const [dov,setDov]       = useState(false);
  const [stage,setStage]   = useState('idle'); // idle|ocr|review|structuring|done
  const [ocrPct,setOcrPct] = useState(0);
  const [rawText,setRaw]   = useState('');
  const [result,setRes]    = useState(null);
  const [err,setErr]       = useState('');
  const ref = useRef();

  const pick = files => {
    const f = files&&files[0]; if(!f) return;
    setFile(f); setErr(''); setRes(null); setRaw(''); setStage('idle');
    setPrev(URL.createObjectURL(f));
  };

  /* Stage 1 — Tesseract OCR */
  const doOCR = async () => {
    setStage('ocr'); setErr(''); setOcrPct(0);
    try {
      const text = await runOCR(file, pct => setOcrPct(pct));
      if (!text) throw new Error('OCR returned no text. Try a clearer/higher-res image.');
      setRaw(text);
      setStage('review');
    } catch(e) {
      setErr('OCR failed: ' + e.message);
      setStage('idle');
    }
  };

  /* Stage 2 — Gemini structures the raw text */
  const doStructure = async () => {
    if (!rawText.trim()) { setErr('OCR text is empty. Cannot proceed.'); return; }
    setStage('structuring'); setErr('');
    try {
      const qs = await geminiStructure(rawText, s.settings.geminiApiKey);
      setRes(qs);
      setStage('done');
    } catch(e) {
      setErr(e.message);
      setStage('review'); // let user edit text and retry
    }
  };

  const importAll = () => {
    if (!result||!result.length) return;
    d({t:'IMPORT',p:result});
    d({t:'NOTIF',p:{type:'success',msg:result.length+' question(s) imported!'}});
    clear();
  };

  const clear = () => {
    setFile(null); if(prev)URL.revokeObjectURL(prev);
    setPrev(null); setRes(null); setRaw(''); setErr(''); setStage('idle'); setOcrPct(0);
  };

  /* ── Stage labels ── */
  const stageBar = (
    <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:12,fontSize:11}}>
      {[
        {k:'idle',    l:'① Upload'},
        {k:'ocr',     l:'② OCR'},
        {k:'review',  l:'③ Review'},
        {k:'structuring',l:'④ AI Parse'},
        {k:'done',    l:'⑤ Import'},
      ].map((st,i,arr)=>{
        const stages = ['idle','ocr','review','structuring','done'];
        const cur = stages.indexOf(stage);
        const me  = stages.indexOf(st.k);
        const done = cur > me;
        const active = cur === me;
        return (
          <React.Fragment key={st.k}>
            <span style={{
              padding:'2px 7px', borderRadius:99, fontWeight:600,
              background: done?'#dcfce7':active?'#4f63f8':'#f0ede8',
              color: done?'#15803d':active?'#fff':'#9ca3af',
              border: active?'1px solid #4f63f8':'1px solid transparent',
              transition:'all .2s'
            }}>{st.l}</span>
            {i<arr.length-1 && <span style={{color:'#d1d5db',fontSize:9}}>▶</span>}
          </React.Fragment>
        );
      })}
    </div>
  );

  return (
    <div className="card" style={{padding:18}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <div className="sec-hdr" style={{margin:0}}>AI Image Extraction</div>
        <span className="badge" style={{background:'#f0fdf4',color:'#15803d',border:'1px solid #bbf7d0',fontSize:10}}>OCR + Gemini</span>
      </div>
      <p style={{fontSize:12,color:'#6b7299',marginBottom:12,lineHeight:1.6}}>
        2-step pipeline: <strong>Tesseract OCR</strong> (free, offline) extracts text → <strong>Gemini</strong> maps structure. Uses ~10× fewer tokens.
      </p>

      {stageBar}

      {/* Drop zone */}
      {stage==='idle' && !file && (
        <div className={'dropzone'+(dov?' dov':'')}
          onDragOver={e=>{e.preventDefault();setDov(true)}}
          onDragLeave={()=>setDov(false)}
          onDrop={e=>{e.preventDefault();setDov(false);pick(e.dataTransfer.files)}}
          onClick={()=>ref.current&&ref.current.click()}>
          <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>pick(e.target.files)}/>
          <div style={{fontSize:28,marginBottom:8}}>🖼️</div>
          <p style={{fontWeight:600,fontSize:13,color:'#1a1d2e',marginBottom:4}}>{dov?'Drop here':'Drag & drop or click to upload'}</p>
          <p style={{fontSize:11,color:'#9ca3af'}}>PNG, JPG, WEBP — max 10 MB</p>
        </div>
      )}

      {/* Image preview + OCR button */}
      {file && stage==='idle' && (
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1px solid #e8e5de'}}>
            <img src={prev} alt="" style={{width:'100%',maxHeight:160,objectFit:'contain',background:'#f5f3ee',display:'block'}}/>
            <button className="btn btn-ghost btn-sm" style={{position:'absolute',top:6,right:6,background:'#fff',border:'1px solid #e8e5de'}} onClick={clear}>✕</button>
          </div>
          <p style={{fontSize:11,color:'#6b7299'}}><strong>{file.name}</strong> — {(file.size/1024).toFixed(0)} KB</p>
          {err && <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#dc2626'}}>⚠️ {err}</div>}
          <button className="btn btn-primary" onClick={doOCR}>
            🔍 Step 1: Extract Text (OCR)
          </button>
        </div>
      )}

      {/* OCR progress */}
      {stage==='ocr' && (
        <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center',padding:'20px 0'}}>
          <div style={{fontSize:24}} className="spin">⟳</div>
          <p style={{fontWeight:600,fontSize:13,color:'#1a1d2e'}}>Running OCR on image…</p>
          <div style={{width:'100%',background:'#f0ede8',borderRadius:99,height:8,overflow:'hidden'}}>
            <div style={{width:ocrPct+'%',background:'#4f63f8',height:'100%',borderRadius:99,transition:'width .3s'}}/>
          </div>
          <p style={{fontSize:11,color:'#6b7299'}}>{ocrPct}% complete — Tesseract analyzing Bangla + English text</p>
        </div>
      )}

      {/* Review / edit raw OCR text */}
      {stage==='review' && (
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{background:'#fffbeb',border:'1px solid #fcd34d',borderRadius:8,padding:'8px 12px'}}>
            <p style={{fontSize:11,fontWeight:600,color:'#92400e',marginBottom:4}}>
              ✏️ Step 2: Review OCR Text — fix any errors before sending to Gemini
            </p>
            <p style={{fontSize:11,color:'#b45309'}}>
              OCR is ~85-90% accurate for Bangla. Correct obvious mistakes for best results.
            </p>
          </div>
          <textarea
            className="ta"
            rows={10}
            style={{fontSize:12,background:'#fafaf8',lineHeight:1.9}}
            value={rawText}
            onChange={e=>setRaw(e.target.value)}
            placeholder="OCR extracted text will appear here…"
          />
          <p style={{fontSize:11,color:'#9ca3af'}}>{rawText.length} characters extracted</p>
          {err && <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#dc2626'}}>⚠️ {err}</div>}
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" style={{flex:1}} onClick={doStructure}>
              ✨ Step 3: Parse with Gemini (text only)
            </button>
            <button className="btn btn-secondary" onClick={clear}>Clear</button>
          </div>
        </div>
      )}

      {/* Gemini structuring */}
      {stage==='structuring' && (
        <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center',padding:'20px 0'}}>
          <div style={{fontSize:24}} className="spin">⟳</div>
          <p style={{fontWeight:600,fontSize:13,color:'#1a1d2e'}}>Gemini parsing structure…</p>
          <p style={{fontSize:11,color:'#6b7299',textAlign:'center'}}>
            Sending text only (no image) → ~10× fewer tokens used
          </p>
        </div>
      )}

      {/* Done — show results */}
      {stage==='done' && result && (
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'10px 12px',fontSize:12,color:'#15803d'}}>
            <div style={{fontWeight:700,marginBottom:5}}>✅ Found {result.length} question(s)</div>
            <ul style={{listStyle:'disc',paddingLeft:16,color:'#166534'}}>
              {result.slice(0,5).map((q,i)=>(
                <li key={i}>[{(q.type||'?').toUpperCase()}] {(q.stem||q.stimulus||'').slice(0,50)}</li>
              ))}
              {result.length>5&&<li>…and {result.length-5} more</li>}
            </ul>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" style={{flex:1}} onClick={importAll}>
              ✅ Import {result.length} Question{result.length>1?'s':''}
            </button>
            <button className="btn btn-secondary" onClick={()=>setStage('review')}>← Edit Text</button>
            <button className="btn btn-ghost" onClick={clear}>Clear</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* Paper preview */
function Preview({forPDF}) {
  const {s} = useApp();
  const {header:h, questions, settings} = s;
  const BN={a:'ক',b:'খ',c:'গ',d:'ঘ'}, LA={a:'a',b:'b',c:'c',d:'d'};
  const L = settings.mcqStyle==='bangla'?BN:LA;
  const sa = settings.showAns;
  const mcqs=questions.filter(q=>q.type==='mcq');
  const cqs=questions.filter(q=>q.type==='cq');
  const sqs=questions.filter(q=>q.type==='sq');
  const mmk=mcqs.reduce((a,q)=>a+(q.marks||1),0);
  const cmk=cqs.length*10;
  const smk=sqs.reduce((a,q)=>a+(q.marks||5),0);

  return (
    <div id={forPDF?'pdf-root':undefined} className="pp">
      {/* Header */}
      <div className="pp-hdr">
        {h.schoolName&&<h1 className="bn-serif">{h.schoolName}</h1>}
        {h.examTitle &&<h2 className="bn-serif">{h.examTitle}</h2>}
        <div className="pp-meta">
          <div className="bn">{h.subject&&<><strong>বিষয়:</strong> {h.subject}</>}{h.year?' | '+h.year:''}</div>
          <div className="bn">{h.time&&<><strong>সময়:</strong> {h.time}</>}</div>
          <div className="bn">{h.totalMarks&&<><strong>পূর্ণমান:</strong> {h.totalMarks}</>}</div>
        </div>
        {h.instructions&&<p style={{fontSize:'10pt',marginTop:8,fontStyle:'italic',textAlign:'left'}} className="bn">{h.instructions}</p>}
      </div>

      {/* Empty */}
      {questions.length===0&&(
        <div className="prev-empty">
          <div style={{fontSize:36,marginBottom:10}}>📄</div>
          <p style={{fontWeight:600}}>Your paper will appear here</p>
          <p style={{fontSize:12,marginTop:4}}>Add questions in the editor on the left</p>
        </div>
      )}

      {/* MCQ */}
      {mcqs.length>0&&<>
        <div className="sec-title bn-serif">বহুনির্বাচনি প্রশ্ন / Multiple Choice <span style={{fontSize:'11pt',fontWeight:400,marginLeft:10}}>[{mmk} marks]</span></div>
        {mcqs.map((q,i)=>(
          <div key={q.id} className="qblock">
            <div className="qstem"><span style={{marginRight:6}}>{i+1}.</span><MText t={q.stem}/><span style={{fontSize:'10pt',fontWeight:400,color:'#6b7299',marginLeft:8}}>({q.marks})</span></div>
            <div className="mcq-opts">
              {['a','b','c','d'].map(k=>(
                <div key={k} className={'mcq-opt'+(sa&&q.correctAnswer===k?' correct-opt':'')}>
                  <span className="bn-serif">{L[k]}.</span>
                  <MText t={q.options?.[k]||''}/>
                  {sa&&q.correctAnswer===k&&<span style={{color:'#15803d',marginLeft:4}}>✓</span>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </>}

      {/* CQ */}
      {cqs.length>0&&<>
        <div className="sec-title bn-serif">সৃজনশীল প্রশ্ন / Creative Questions <span style={{fontSize:'11pt',fontWeight:400,marginLeft:10}}>[{cmk} marks]</span></div>
        {cqs.map((q,i)=>(
          <div key={q.id} className="qblock">
            <div className="qstem"><span style={{marginRight:6}}>{i+1}.</span><span className="bn-serif">উদ্দীপক:</span></div>
            <div className="cq-stim bn"><MText t={q.stimulus}/></div>
            <div className="cq-subs bn">
              {[{k:'subA',l:'ক',m:1},{k:'subB',l:'খ',m:2},{k:'subC',l:'গ',m:3},{k:'subD',l:'ঘ',m:4}].map(sub=>q[sub.k]?(
                <div key={sub.k} className="cq-si">
                  <span className="bn-serif" style={{fontWeight:700,minWidth:'1.5em'}}>{sub.l})</span>
                  <span style={{flex:1}}><MText t={q[sub.k]}/></span>
                  <span style={{color:'#6b7299',fontSize:'10pt',marginLeft:8,flexShrink:0}}>{sub.m}</span>
                </div>
              ):null)}
            </div>
          </div>
        ))}
      </>}

      {/* SQ */}
      {sqs.length>0&&<>
        <div className="sec-title">Short Questions <span style={{fontSize:'11pt',fontWeight:400,marginLeft:10}}>[{smk} marks]</span></div>
        {sqs.map((q,i)=>(
          <div key={q.id} className="qblock">
            <div className="qstem"><span style={{marginRight:6}}>{i+1}.</span><MText t={q.stem}/><span style={{fontSize:'10pt',fontWeight:400,color:'#6b7299',marginLeft:8}}>({q.marks})</span></div>
          </div>
        ))}
      </>}

      {questions.length>0&&<div className="pp-foot bn">— প্রশ্নপত্র সমাপ্ত / End of Question Paper —</div>}
    </div>
  );
}

/* Toolbar */
function Toolbar() {
  const {s,d} = useApp();
  const [exp,setExp]=useState(false);
  const notify=(type,msg)=>d({t:'NOTIF',p:{type,msg}});

  const handleExport=async()=>{
    if (!s.questions.length){notify('warning','Add questions first.');return;}
    setExp(true);
    try{await doExport(s.header);notify('success','PDF exported!');}
    catch(e){notify('error',e.message);}
    finally{setExp(false);}
  };

  const handlePrint=()=>{
    if (!s.questions.length){notify('warning','Add questions first.');return;}
    window.print();
  };

  const clearAll=()=>{
    if (!s.questions.length) return;
    if (window.confirm('Clear all questions and header? This cannot be undone.')){
      d({t:'CLEAR'}); notify('success','Paper cleared.');
    }
  };

  return (
    <header className="toolbar">
      <div className="logo-icon">প্র</div>
      <div style={{marginRight:4}}>
        <div className="logo-p">প্রশ্নপত্র বিল্ডার</div>
        <div className="logo-s">SSC / HSC Question Builder</div>
      </div>

      {/* Mobile tab toggle */}
      <div className="tabbar" style={{flex:1,maxWidth:180}}>
        <button className={'tabbtn'+(s.ui.tab==='editor'?' on':'')} onClick={()=>d({t:'TAB',p:'editor'})}>✏️ Edit</button>
        <button className={'tabbtn'+(s.ui.tab==='preview'?' on':'')} onClick={()=>d({t:'TAB',p:'preview'})}>👁️ Preview</button>
      </div>

      <div style={{flex:1}}/>
      {s.questions.length>0&&<span className="badge badge-mcq">{s.questions.length} Q</span>}
      <button className="btn btn-ghost" onClick={handlePrint} title="Print paper">🖨️</button>
      <button className="btn btn-primary" onClick={handleExport} disabled={exp}>
        {exp?<span className="spin">⟳</span>:'⬇️'} <span>{exp?'Exporting…':'Export PDF'}</span>
      </button>
      <button className="btn btn-ghost" onClick={clearAll} style={{color:'#dc2626'}} title="Clear all">🗑</button>
      <button className="btn btn-ghost" onClick={()=>d({t:'SETOPEN',p:true})} title="Settings">⚙️</button>
    </header>
  );
}

/* App */
function App() {
  const {s} = useApp();
  const tab = s.ui.tab;
  return (
    <div>
      <Toolbar/>

      {/* Hidden PDF target — always in DOM */}
      <div style={{position:'fixed',top:'-99999px',left:0,width:'794px',visibility:'hidden',zIndex:-1}} aria-hidden="true">
        <Preview forPDF={true}/>
      </div>

      <div className="main">
        {/* Editor column */}
        <div className={'editor-col'+(tab==='preview'?' mob-hide':'')}>
          <HeaderEditor/>
          <ImgUpload/>
          <div>
            <div className="sec-hdr">
              Questions
              {s.questions.length>0&&<span className="badge badge-mcq" style={{marginLeft:8}}>{s.questions.length}</span>}
            </div>
            <QList/>
          </div>
        </div>

        {/* Preview column */}
        <div className={'preview-col'+(tab==='preview'?' mob-show':'')}>
          <div className="preview-sticky">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div className="sec-hdr" style={{margin:0,flex:1}}>Live Preview</div>
              <span style={{fontSize:11,color:'#9ca3af'}}>A4 · print ready</span>
            </div>
            <div className="prev-frame">
              <Preview/>
            </div>
          </div>
        </div>
      </div>

      <div className="math-hint">
        💡 Math tip: <code>$x^2 + y^2$</code> for inline math &nbsp;|&nbsp; <code>$$\frac{"{a}"}{"{b}"}$$</code> for block equations
      </div>

      <Settings/>
      <Toast/>
    </div>
  );
}

/* Root */
function Root() {
  const [s,d] = useReducer(reducer, initState);
  return (
    <Ctx.Provider value={{s,d}}>
      <App/>
    </Ctx.Provider>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(Root));
</script>
</body>
